services:

  mongodb:
    build:
      context: ./ex1
      dockerfile: Dockerfile.mongo
    container_name: autorepair_mongo
    environment:
      - MONGO_INITDB_DATABASE=autoRepair
    volumes:
      - mongo_data:/data/db
    networks:
      - autorepair-network

  api_dados:
    build:
      context: ./ex1
      dockerfile: Dockerfile
    container_name: autorepair_api
    ports:
      - "16025:16025"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/autoRepair
    depends_on:
      - mongodb
    networks:
      - autorepair-network

  interface:
    build:
      context: ./ex2
      dockerfile: Dockerfile.interface
    container_name: autorepair_interface
    ports:
      - "16026:16026"
    environment:
      - API_URL=http://api_dados:16025
      - PORT=16026
    depends_on:
      - api_dados
    networks:
      - autorepair-network

networks:
  autorepair-network:
    driver: bridge

volumes:
  mongo_data:
